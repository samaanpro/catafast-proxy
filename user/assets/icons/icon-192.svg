<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
  </defs>
  <rect width="192" height="192" rx="34.56" fill="url(#g)"/>
  <!-- Person/Dumbbell icon -->
  <g transform="translate(96,70)" fill="white">
    <!-- Head -->
    <circle cx="0" cy="-18" r="10"/>
    <!-- Body -->
    <rect x="-6" y="-6" width="12" height="22" rx="2"/>
    <!-- Arms (raised) -->
    <rect x="5" y="-2" width="24" height="5" rx="2"/>
    <rect x="-29" y="-2" width="24" height="5" rx="2"/>
    <!-- Legs -->
    <rect x="-6" y="16" width="5" height="18" rx="2"/>
    <rect x="1" y="16" width="5" height="18" rx="2"/>
  </g>
  <!-- KG Text -->
  <text x="96" y="132" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-weight="700" font-size="28" fill="white" opacity="0.85">KG</text>
</svg>
